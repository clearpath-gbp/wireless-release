name: wireless_watcher_ci

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *" # every day at midnight

permissions:
  actions: read
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv
      - uses: actions/checkout@v7
      - name: Mark safe repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Setup virtual environment
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install pre-commit
      - name: Run pre-commit
        run: |
          . venv/bin/activate
          pre-commit run --all-files

  wireless_watcher_osrf_industrial_ci_lyrical:
    name: Lyrical OSRF Industrial
    strategy:
      matrix:
        env:
          - {ROS_REPO: testing, ROS_DISTRO: lyrical}
          - {ROS_REPO: main, ROS_DISTRO: lyrical}
      fail-fast: false
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: 'ros-industrial/industrial_ci@master'
        env:
          ROS_REPO: ${{ matrix.env.ROS_REPO }}
          ROS_DISTRO: ${{ matrix.env.ROS_DISTRO }}
  wireless_watcher_cpr_ci_lyrical:
    name: Lyrical Clearpath Release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/clearpathrobotics/clearpath_docker:lyrical-ci-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ros-tooling/action-ros-ci@v0.4
        id: action_ros_ci_step
        with:
          target-ros2-distro: lyrical
          package-name: |
            wireless_watcher
  wireless_watcher_src_ci_lyrical:
    name: Lyrical Clearpath Source
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: lyrical
      - uses: ros-tooling/action-ros-ci@v0.4
        id: action_ros_ci_step
        with:
          target-ros2-distro: lyrical
          package-name: |
            wireless_watcher
